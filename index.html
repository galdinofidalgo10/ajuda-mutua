<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ajuda Mútua | Protocolo Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #020617; color: #f8fafc; font-family: 'Montserrat', sans-serif; }
        .glass-card { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(10px); border: 1px solid rgba(212, 175, 55, 0.1); border-radius: 20px; }
        .btn-gold { background: linear-gradient(135deg, #b8860b 0%, #fde047 100%); color: #000; font-weight: 900; text-transform: uppercase; }
        .input-field { width: 100%; background: rgba(30, 41, 59, 0.5); border: 1px solid rgba(212, 175, 55, 0.2); padding: 15px; border-radius: 12px; color: white; outline: none; }
        #toast { visibility: hidden; min-width: 280px; background: #fde047; color: #000; text-align: center; border-radius: 50px; padding: 15px; position: fixed; z-index: 9999; left: 50%; top: 30px; transform: translateX(-50%); font-weight: 900; font-size: 11px; }
        #toast.show { visibility: visible; animation: slideDown 0.5s; }
        @keyframes slideDown { from { top: -100px; } to { top: 30px; } }
    </style>
</head>
<body class="p-4">
    <div id="toast"></div>

    <div class="max-w-md mx-auto">
        <header class="text-center mb-6 pt-4">
            <h1 class="text-3xl font-black italic text-yellow-500 uppercase tracking-tighter">Ajuda Mútua</h1>
            <p class="text-[8px] font-bold text-slate-500 tracking-[0.4em] uppercase">Protocolo Elite</p>
        </header>

        <div class="space-y-3 mb-6">
            <div onclick="copy('04036277375')" class="glass-card p-4 border-l-4 border-l-yellow-500 active:scale-95 transition-transform">
                <div class="flex justify-between items-center">
                    <div><p class="text-[7px] text-yellow-500 font-black uppercase">Nível 01</p><h3 class="font-black text-xs uppercase">Galdino Pereira Fidalgo</h3></div>
                    <span class="text-yellow-500 font-black text-xs">R$ 5,00</span>
                </div>
            </div>
            <div onclick="copy('04036277375')" class="glass-card p-4 border-l-4 border-l-yellow-500 active:scale-95 transition-transform">
                <div class="flex justify-between items-center">
                    <div><p class="text-[7px] text-yellow-500 font-black uppercase">Nível 02</p><h3 class="font-black text-xs uppercase">Galdino Pereira Fidalgo</h3></div>
                    <span class="text-yellow-500 font-black text-xs">R$ 5,00</span>
                </div>
            </div>
            <div onclick="copy('04036277375')" class="glass-card p-4 border-l-4 border-l-yellow-500 active:scale-95 transition-transform">
                <div class="flex justify-between items-center">
                    <div><p class="text-[7px] text-yellow-500 font-black uppercase">Nível 03</p><h3 class="font-black text-xs uppercase">Galdino Pereira Fidalgo</h3></div>
                    <span class="text-yellow-500 font-black text-xs">R$ 5,00</span>
                </div>
            </div>
        </div>

        <div class="glass-card p-6 border-t-2 border-t-yellow-500/30">
            <h2 class="text-center text-[10px] text-yellow-500 font-black uppercase mb-4 tracking-widest">Validar sua Entrada</h2>
            <div class="space-y-4">
                <div class="grid grid-cols-3 gap-2">
                    <label class="btn-gold h-10 rounded-lg flex items-center justify-center text-[8px] cursor-pointer">PIX 1<input type="file" id="f1" class="hidden" accept="image/*"></label>
                    <label class="btn-gold h-10 rounded-lg flex items-center justify-center text-[8px] cursor-pointer">PIX 2<input type="file" id="f2" class="hidden" accept="image/*"></label>
                    <label class="btn-gold h-10 rounded-lg flex items-center justify-center text-[8px] cursor-pointer">PIX 3<input type="file" id="f3" class="hidden" accept="image/*"></label>
                </div>
                <input type="text" id="nome" placeholder="SEU NOME COMPLETO" class="input-field text-xs uppercase">
                <input type="text" id="pix_user" placeholder="SUA CHAVE PIX" class="input-field text-xs">
                <button onclick="ativar()" class="btn-gold w-full h-16 rounded-xl text-sm font-black active:scale-95">Ativar Agora</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCZIP0M0M8FqC_LAtI9I36e_IIn_V-C4m4",
            authDomain: "ajuda-mutua-7d99a.firebaseapp.com",
            databaseURL: "https://ajuda-mutua-7d99a-default-rtdb.firebaseio.com",
            projectId: "ajuda-mutua-7d99a",
            storageBucket: "ajuda-mutua-7d99a.appspot.com",
            appId: "1:1070775313117:web:fa90f5f0cb519ab38b1d34"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function showT(m) { const t = document.getElementById("toast"); t.innerText = m; t.className = "show"; setTimeout(() => { t.className = ""; }, 3000); }
        function copy(v) { navigator.clipboard.writeText(v); showT("CHAVE COPIADA!"); }

        // Função para converter e comprimir imagem
        const processImg = file => new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const max_size = 600; // Reduz para evitar erro de tamanho no Firebase
                    let width = img.width;
                    let height = img.height;
                    if (width > height) { if (width > max_size) { height *= max_size / width; width = max_size; } }
                    else { if (height > max_size) { width *= max_size / height; height = max_size; } }
                    canvas.width = width; canvas.height = height;
                    canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', 0.7)); // Qualidade 70%
                };
            };
        });

        async function ativar() {
            const n = document.getElementById('nome').value;
            const p = document.getElementById('pix_user').value;
            const inputs = [document.getElementById('f1'), document.getElementById('f2'), document.getElementById('f3')];
            
            if(!n || !p) return showT("PREENCHA NOME E PIX!");
            
            let fotos = [];
            showT("CARREGANDO FOTOS...");

            try {
                for (const input of inputs) {
                    if (input.files[0]) {
                        const b64 = await processImg(input.files[0]);
                        fotos.push(b64);
                    }
                }

                if(fotos.length < 3) return showT("ANEXE OS 3 COMPROVANTES!");

                database.ref('solicitacoes/').push({
                    nome: n, pix: p, comprovantes: fotos, data: new Date().toLocaleString('pt-BR'), status: 'pendente'
                }).then(() => { 
                    showT("ENVIADO COM SUCESSO!");
                    document.getElementById('nome').value = ""; document.getElementById('pix_user').value = "";
                }).catch(e => showT("ERRO NAS REGRAS DO FIREBASE"));
            } catch (e) { showT("ERRO AO PROCESSAR."); }
        }
    </script>
</body>
</html>
