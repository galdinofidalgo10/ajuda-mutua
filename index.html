<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajuda Mútua - Protocolo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        body { 
            background-color: #05070a; 
            color: #e2e8f0; 
            font-family: 'Inter', sans-serif; 
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .gold-text { color: #d4af37; font-style: italic; }
        .gold-bg { background: linear-gradient(135deg, #d4af37 0%, #f2d06b 100%); color: #000; }
        .card { background-color: rgba(15, 23, 42, 0.9); border: 1px solid rgba(212, 175, 55, 0.2); transition: all 0.2s; }
        
        header { 
            flex-shrink: 0; 
            z-index: 50; 
            background-color: #05070a; 
            border-bottom: 1px solid rgba(212, 175, 55, 0.2); 
            padding: 15px 10px;
        }

        main { 
            flex-grow: 1; 
            overflow-y: auto; 
            padding: 20px 15px;
            padding-bottom: 100px;
            scrollbar-width: none;
        }
        main::-webkit-scrollbar { display: none; }

        footer { 
            flex-shrink: 0; 
            padding: 12px; 
            text-align: center; 
            border-top: 1px solid rgba(212, 175, 55, 0.3); 
            background-color: #05070a;
            z-index: 50;
        }

        #toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: #d4af37; color: #000; padding: 8px 20px; border-radius: 30px;
            font-size: 11px; font-weight: 900; opacity: 0; transition: opacity 0.3s; z-index: 1000;
        }
    </style>
</head>
<body>

    <div id="toast">Chave Pix Copiada!</div>

    <header>
        <div class="max-w-md mx-auto text-center">
            <h1 class="text-xl font-black gold-text uppercase tracking-widest italic">Fila de Ativação</h1>
            <p class="text-[8px] text-slate-500 uppercase mb-3 font-bold">Toque nos cards para copiar as chaves</p>
            
            <div class="space-y-2">
                <div id="card1" class="card p-3 rounded-xl flex justify-between items-center border-l-4 border-yellow-600 cursor-pointer">
                    <div class="text-left">
                        <p class="text-[7px] gold-text font-black uppercase">Nível 1 - Direto</p>
                        <p id="mestre1-nome" class="text-xs font-bold text-white italic">Carregando...</p>
                    </div>
                    <p id="mestre1-pix" class="text-[9px] font-mono text-slate-400">...</p>
                </div>
                <div id="card2" class="card p-3 rounded-xl flex justify-between items-center border-l-4 border-yellow-600 cursor-pointer">
                    <div class="text-left">
                        <p class="text-[7px] gold-text font-black uppercase">Nível 2 - Indireto</p>
                        <p id="mestre2-nome" class="text-xs font-bold text-white italic">Carregando...</p>
                    </div>
                    <p id="mestre2-pix" class="text-[9px] font-mono text-slate-400">...</p>
                </div>
                <div id="card3" class="card p-3 rounded-xl flex justify-between items-center border-l-4 border-yellow-600 cursor-pointer">
                    <div class="text-left">
                        <p class="text-[7px] gold-text font-black uppercase">Nível 3 - Raiz</p>
                        <p id="mestre3-nome" class="text-xs font-bold text-white italic">Carregando...</p>
                    </div>
                    <p id="mestre3-pix" class="text-[9px] font-mono text-slate-400">...</p>
                </div>
            </div>
        </div>
    </header>

    <main>
        <div class="max-w-md mx-auto space-y-6">
            <div class="space-y-3">
                <p class="text-center text-[10px] gold-text uppercase font-black tracking-widest italic">1. Anexe os Comprovantes</p>
                <div class="grid grid-cols-1 gap-2">
                    <label class="bg-slate-900 border border-slate-800 py-4 rounded-xl text-[10px] font-bold text-center cursor-pointer block">📄 COMPROVANTE 01 <input type="file" class="hidden"></label>
                    <label class="bg-slate-900 border border-slate-800 py-4 rounded-xl text-[10px] font-bold text-center cursor-pointer block">📄 COMPROVANTE 02 <input type="file" class="hidden"></label>
                    <label class="bg-slate-900 border border-slate-800 py-4 rounded-xl text-[10px] font-bold text-center cursor-pointer block">📄 COMPROVANTE 03 <input type="file" class="hidden"></label>
                </div>
            </div>
            <div class="space-y-3 border-t border-slate-800 pt-5">
                <input type="text" placeholder="Nome Completo" class="w-full p-4 bg-slate-900 border border-slate-800 rounded-xl text-sm text-white">
                <input type="text" placeholder="Sua Chave Pix" class="w-full p-4 bg-slate-900 border border-slate-800 rounded-xl text-sm text-white">
                <button class="w-full gold-bg py-5 rounded-2xl text-[11px] font-black uppercase italic">Ativar Protocolo</button>
            </div>
        </div>
    </main>

    <footer>
        <p class="text-[9px] text-slate-500 uppercase font-black tracking-widest">
            © 2026 PROTOCOLO <span class="gold-text italic">GALDINO FIDALGO</span>
        </p>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

        // Credenciais do seu print
        const firebaseConfig = {
            apiKey: "AIzaSyCZipVpWjOMtULxM5ZjJG_Ky",
            authDomain: "ajuda-mutua-7d99a.firebaseapp.com",
            projectId: "ajuda-mutua-7d99a",
            storageBucket: "ajuda-mutua-7d99a.appspot.com",
            messagingSenderId: "1070775313117",
            appId: "1:1070775313117:web:fa8095ff0e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.copiar = (txt) => {
            if(!txt || txt === "...") return;
            navigator.clipboard.writeText(txt);
            const t = document.getElementById('toast');
            t.style.opacity = '1';
            setTimeout(() => t.style.opacity = '0', 2000);
        };

        async function carregar() {
            try {
                const snap = await getDoc(doc(db, "usuarios", "mestre"));
                if (snap.exists()) {
                    const d = snap.data();
                    const nome = d.nome || "Galdino Pereira Fidalgo";
                    const pix = d.pix || "04036277375";

                    document.querySelectorAll('[id$="-nome"]').forEach(el => el.innerText = nome);
                    document.querySelectorAll('[id$="-pix"]').forEach(el => el.innerText = pix);
                    document.querySelectorAll('[id^="card"]').forEach(el => el.onclick = () => copiar(pix));
                }
            } catch (e) { console.error(e); }
        }
        window.onload = carregar;
    </script>
</body>
</html>
