<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ajuda Mútua | Protocolo Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --gold-light: #fde047; }
        body { background: #020617; color: #f8fafc; font-family: 'Montserrat', sans-serif; }
        .glass-card { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(10px); border: 1px solid rgba(212, 175, 55, 0.1); border-radius: 20px; }
        .btn-gold { background: linear-gradient(135deg, #b8860b 0%, #fde047 100%); color: #000; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; }
        .input-field { width: 100%; background: rgba(30, 41, 59, 0.5); border: 1px solid rgba(212, 175, 55, 0.2); padding: 18px; border-radius: 12px; color: white; outline: none; }
        #toast { visibility: hidden; min-width: 280px; background: linear-gradient(135deg, #b8860b, #fde047); color: #000; text-align: center; border-radius: 50px; padding: 15px; position: fixed; z-index: 9999; left: 50%; top: 30px; transform: translateX(-50%); font-weight: 900; font-size: 11px; }
        #toast.show { visibility: visible; animation: slideDown 0.5s; }
        @keyframes slideDown { from { top: -100px; } to { top: 30px; } }
    </style>
</head>
<body class="p-6">
    <div id="toast">Notificação</div>

    <div id="cadastro-screen" class="max-w-md mx-auto">
        <header class="text-center mb-8 pt-4">
            <h1 class="text-4xl font-black italic text-yellow-500 uppercase tracking-tighter">Ajuda Mútua</h1>
            <p class="text-[9px] font-bold text-slate-500 tracking-[0.4em] uppercase">Protocolo Elite</p>
        </header>

        <div class="space-y-3 mb-8">
            <div onclick="copy('04036277375')" class="glass-card p-4 cursor-pointer active:scale-95 transition-transform">
                <div class="flex justify-between items-center">
                    <div><p class="text-[7px] text-yellow-500 font-black uppercase">Nível 01</p><h3 class="font-black text-xs">Galdino Pereira Fidalgo</h3></div>
                    <span class="text-yellow-500 font-black text-xs">R$ 5,00</span>
                </div>
            </div>
            </div>

        <div class="glass-card p-6 border-t-2 border-t-yellow-500/30 shadow-2xl">
            <h2 class="text-center text-[10px] text-yellow-500 font-black uppercase mb-6 tracking-widest">Validar sua Entrada</h2>
            <div class="space-y-4">
                <div class="grid grid-cols-3 gap-2">
                    <label class="btn-gold h-10 rounded-lg flex items-center justify-center text-[8px] text-center cursor-pointer">PIX 01<input type="file" id="file1" class="hidden" accept="image/*"></label>
                    <label class="btn-gold h-10 rounded-lg flex items-center justify-center text-[8px] text-center cursor-pointer">PIX 02<input type="file" id="file2" class="hidden" accept="image/*"></label>
                    <label class="btn-gold h-10 rounded-lg flex items-center justify-center text-[8px] text-center cursor-pointer">PIX 03<input type="file" id="file3" class="hidden" accept="image/*"></label>
                </div>
                <input type="text" id="nome" placeholder="NOME COMPLETO" class="input-field text-xs">
                <input type="text" id="pix_user" placeholder="SUA CHAVE PIX" class="input-field text-xs">
                <button onclick="ativar()" class="btn-gold w-full h-16 rounded-xl text-sm mt-4 active:scale-95">Ativar Agora</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "COLE_SUA_CHAVE_AQUI", 
            authDomain: "ajuda-mutua-7d99a.firebaseapp.com",
            databaseURL: "https://ajuda-mutua-7d99a-default-rtdb.firebaseio.com",
            projectId: "ajuda-mutua-7d99a",
            storageBucket: "ajuda-mutua-7d99a.appspot.com",
            appId: "1:1070775313117:web:fa90f5f0cb519ab38b1d34"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function showT(m) { const t = document.getElementById("toast"); t.innerText = m; t.className = "show"; setTimeout(() => { t.className = ""; }, 3000); }
        function copy(v) { navigator.clipboard.writeText(v); showT("CHAVE COPIADA!"); }

        async function ativar() {
            const n = document.getElementById('nome').value;
            const p = document.getElementById('pix_user').value;
            const inputs = [document.getElementById('file1'), document.getElementById('file2'), document.getElementById('file3')];
            
            if(!n || !p) return showT("PREENCHA TUDO!");
            
            let temFoto = false;
            inputs.forEach(i => { if(i.files[0]) temFoto = true; });
            if(!temFoto) return showT("ANEXE OS COMPROVANTES!");

            showT("PROCESSANDO FOTOS...");

            const toBase64 = file => new Promise((res, rej) => {
                const r = new FileReader();
                r.readAsDataURL(file);
                r.onload = () => res(r.result);
                r.onerror = e => rej(e);
            });

            try {
                let fotos = [];
                for (let input of inputs) {
                    if (input.files[0]) {
                        const b64 = await toBase64(input.files[0]);
                        fotos.push(b64);
                    }
                }

                database.ref('solicitacoes/').push({
                    nome: n, pix: p, comprovantes: fotos, data: new Date().toLocaleString('pt-BR'), status: 'pendente'
                }).then(() => { 
                    showT("ENVIADO COM SUCESSO!");
                    document.getElementById('nome').value = "";
                    document.getElementById('pix_user').value = "";
                });
            } catch (e) {
                showT("ERRO AO PROCESSAR");
            }
        }
    </script>
</body>
</html>
