<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajuda Mútua | Protocolo de Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --gold-light: #f2d06b; --bg: #020617; }
        body { 
            background: radial-gradient(circle at top, #0f172a 0%, var(--bg) 100%); 
            color: #f8fafc; font-family: 'Inter', sans-serif; min-height: 100vh; overflow-x: hidden;
        }

        /* Títulos Estilo Tech */
        .font-tech { font-family: 'Syncopate', sans-serif; text-transform: uppercase; letter-spacing: -1px; }

        /* Cards com Efeito de Vidro Profundo */
        .glass-panel {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Notificação de Elite (Substitui o alerta do navegador) */
        #elite-notify {
            display: none; position: fixed; top: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(15px);
            border-bottom: 2px solid var(--gold); border-radius: 16px; padding: 18px 35px;
            z-index: 9999; box-shadow: 0 20px 40px rgba(0,0,0,0.7);
            animation: slideIn 0.4s ease forwards;
        }

        /* Custom File Upload - Remove o estilo cinza do navegador */
        .file-upload-wrapper {
            position: relative; width: 100%; height: 60px;
            background: rgba(15, 23, 42, 0.8); border: 1px dashed rgba(212, 175, 55, 0.3);
            border-radius: 16px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s; margin-bottom: 12px;
        }
        .file-upload-wrapper:hover { border-color: var(--gold); background: rgba(212, 175, 55, 0.05); }
        .file-upload-wrapper span { font-[9px]; font-weight: 900; color: #64748b; letter-spacing: 2px; }

        /* Botão de Ação Ultra */
        .btn-activate {
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
            color: #000; font-weight: 900; text-transform: uppercase; letter-spacing: 2px;
            padding: 24px; border-radius: 20px; width: 100%;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.4);
            transition: 0.3s; font-size: 13px;
        }
        .btn-activate:active { transform: scale(0.96); opacity: 0.9; }

        @keyframes slideIn { from { top: -100px; opacity: 0; } to { top: 30px; opacity: 1; } }
    </style>
</head>
<body class="p-6">

    <div id="elite-notify">
        <div class="flex items-center gap-4">
            <div class="w-2 h-2 rounded-full bg-yellow-500 animate-pulse"></div>
            <span id="notify-msg" class="text-[11px] font-black tracking-widest text-white uppercase italic">Ajuda Mútua: Pix Copiado!</span>
        </div>
    </div>

    <div class="max-w-md mx-auto relative">
        <header class="text-center mb-16 pt-8">
            <h1 class="font-tech text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-b from-white to-slate-500">
                Fila de Ativação
            </h1>
            <div class="h-[2px] w-12 bg-yellow-600 mx-auto mt-4 rounded-full"></div>
            <p class="text-[8px] font-black text-slate-500 uppercase tracking-[0.5em] mt-6 italic">Protocolo Ajuda Mútua Premium</p>
        </header>

        <div id="mestres-container" class="space-y-4">
            <div class="h-24 w-full glass-panel animate-pulse opacity-20"></div>
        </div>

        <section class="mt-16">
            <h3 class="text-center text-[10px] text-yellow-600 font-black uppercase tracking-widest mb-8 italic">1. Protocolo de Depósito</h3>
            <div class="space-y-3">
                <label class="file-upload-wrapper">
                    <span>ANEXAR COMPROVANTE M1</span>
                    <input type="file" class="hidden">
                </label>
                <label class="file-upload-wrapper">
                    <span>ANEXAR COMPROVANTE M2</span>
                    <input type="file" class="hidden">
                </label>
                <label class="file-upload-wrapper">
                    <span>ANEXAR COMPROVANTE M3</span>
                    <input type="file" class="hidden">
                </label>
            </div>
        </section>

        <section class="mt-14 mb-20">
            <h3 class="text-center text-[10px] text-yellow-600 font-black uppercase tracking-widest mb-8 italic">2. Credenciais de Recebimento</h3>
            <input type="text" placeholder="NOME COMPLETO DO TITULAR" class="w-full p-6 glass-panel border-none mb-4 outline-none text-sm placeholder:text-slate-700">
            <input type="text" placeholder="CHAVE PIX PARA RECEBER" class="w-full p-6 glass-panel border-none mb-8 outline-none text-sm placeholder:text-slate-700">
            
            <button class="btn-activate">
                Ativar Meu Protocolo
            </button>
        </section>

        <footer class="text-center py-10 opacity-30 border-t border-slate-900">
            <p class="text-[9px] font-black uppercase tracking-[0.6em]">
                © 2026 AJUDA MÚTUA • Direitos Reservados
            </p>
        </footer>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

        // Configuração de 2026 baseada no seu sistema
        const firebaseConfig = {
            apiKey: "AIzaSyCZipVpWjOMtULxM5ZjJG_Ky",
            authDomain: "ajuda-mutua-7d99a.firebaseapp.com",
            projectId: "ajuda-mutua-7d99a",
            storageBucket: "ajuda-mutua-7d99a.appspot.com",
            messagingSenderId: "1070775313117",
            appId: "1:1070775313117:web:fa8095ff0e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Notificação Customizada Profissional
        window.eliteNotify = (msg) => {
            const el = document.getElementById('elite-notify');
            document.getElementById('notify-msg').innerText = "AJUDA MÚTUA: " + msg;
            el.style.display = 'block';
            setTimeout(() => { el.style.display = 'none'; }, 3500);
        };

        async function loadEliteProtocol() {
            try {
                const docRef = doc(db, "usuarios", "mestre");
                const snap = await getDoc(docRef);
                
                if (snap.exists()) {
                    const { nome, pix } = snap.data();
                    const n = nome || "Galdino Pereira Fidalgo";
                    const p = pix || "04036277375";

                    const card = (lvl, title, owner, key) => `
                        <div onclick="navigator.clipboard.writeText('${key}'); eliteNotify('Pix Copiado!')" 
                             class="glass-panel p-6 flex justify-between items-center cursor-pointer active:scale-95">
                            <div>
                                <p class="text-[8px] text-yellow-600 font-black uppercase italic tracking-widest">${lvl}</p>
                                <p class="text-sm font-black italic text-white mt-1">${owner.toUpperCase()}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-[10px] font-mono text-slate-500">${key}</p>
                                <p class="text-[9px] text-yellow-600 font-bold italic mt-1">R$ 5,00</p>
                            </div>
                        </div>
                    `;

                    document.getElementById('mestres-container').innerHTML = 
                        card("Master Level 01", "Direto", n, p) +
                        card("Suporte Level 02", "Ajuda Mútua", "SISTEMA", p) +
                        card("Raiz Level 03", "Fundador", n, p);
                }
            } catch (err) { console.error("Falha no Protocolo:", err); }
        }

        window.onload = loadEliteProtocol;
    </script>
</body>
</html>
