<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protocolo Elite | Cadastro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #020617; color: #f8fafc; font-family: 'Montserrat', sans-serif; }
        .glass-card { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(10px); border: 1px solid rgba(212, 175, 55, 0.1); border-radius: 20px; }
        .btn-gold { background: linear-gradient(135deg, #b8860b 0%, #fde047 100%); color: #000; font-weight: 900; text-transform: uppercase; }
        .input-field { width: 100%; background: rgba(30, 41, 59, 0.5); border: 1px solid rgba(212, 175, 55, 0.2); padding: 15px; border-radius: 12px; color: white; outline: none; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-md mx-auto">
        <header class="text-center mb-8 pt-4">
            <h1 class="text-3xl font-black italic text-yellow-500 uppercase tracking-tighter">AJUDA MÚTUA</h1>
            <p class="text-[8px] font-bold text-slate-500 tracking-[0.4em] uppercase">Protocolo Elite</p>
        </header>

        <div id="container-pix" class="space-y-3 mb-6">
            </div>

        <div class="glass-card p-6 border-t-2 border-yellow-500/30">
            <div class="space-y-4">
                <div class="grid grid-cols-3 gap-2">
                    <label class="btn-gold h-10 rounded-lg flex items-center justify-center text-[8px] cursor-pointer text-center">PIX 1<input type="file" id="f1" class="hidden" accept="image/*"></label>
                    <label class="btn-gold h-10 rounded-lg flex items-center justify-center text-[8px] cursor-pointer text-center">PIX 2<input type="file" id="f2" class="hidden" accept="image/*"></label>
                    <label class="btn-gold h-10 rounded-lg flex items-center justify-center text-[8px] cursor-pointer text-center">PIX 3<input type="file" id="f3" class="hidden" accept="image/*"></label>
                </div>
                <input type="text" id="nome" placeholder="NOME COMPLETO" class="input-field text-xs uppercase">
                <input type="tel" id="whatsapp" placeholder="WHATSAPP (DDD + NÚMERO)" class="input-field text-xs">
                <button onclick="solicitarAtivacao()" id="btnAtivar" class="btn-gold w-full h-16 rounded-xl text-sm font-black shadow-lg shadow-yellow-500/20">Solicitar Ativação</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCZIP0M0M8FqC_LAtI9I36e_IIn_V-C4m4",
            authDomain: "ajuda-mutua-7d99a.firebaseapp.com",
            databaseURL: "https://ajuda-mutua-7d99a-default-rtdb.firebaseio.com",
            projectId: "ajuda-mutua-7d99a",
            storageBucket: "ajuda-mutua-7d99a.appspot.com",
            appId: "1:1070775313117:web:fa90f5f0cb519ab38b1d34"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function solicitarAtivacao() {
            const n = document.getElementById('nome').value.trim();
            const w = document.getElementById('whatsapp').value.replace(/\D/g,'');
            if(!n || !w) return alert("Preencha os campos!");

            document.getElementById('btnAtivar').innerText = "ENVIANDO...";
            database.ref('solicitacoes/').push({
                nome: n, whatsapp: w, status: 'pendente', data: new Date().toLocaleString('pt-BR')
            }).then(() => {
                alert("Enviado com sucesso! Aguarde contato da gestão.");
                location.reload();
            });
        }
    </script>
</body>
</html>
