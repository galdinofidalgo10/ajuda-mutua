<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajuda Mútua - Protocolo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Removi as travas de overflow. Agora o site rola normal. */
        body { 
            background-color: #05070a; 
            color: #e2e8f0; 
            font-family: sans-serif; 
            margin: 0;
            padding: 20px;
        }
        .gold-text { color: #d4af37; font-weight: bold; }
        .gold-bg { background: linear-gradient(135deg, #d4af37 0%, #f2d06b 100%); color: #000; }
        .card { 
            background-color: rgba(15, 23, 42, 0.9); 
            border: 1px solid rgba(212, 175, 55, 0.2); 
            margin-bottom: 10px;
            padding: 15px;
            border-radius: 12px;
        }
    </style>
</head>
<body>

    <div class="max-w-md mx-auto">
        <header class="text-center mb-8">
            <h1 class="text-2xl font-black gold-text uppercase italic">Fila de Ativação</h1>
            <p class="text-xs text-slate-500 uppercase">Toque para copiar o Pix</p>
        </header>

        <div id="lista-mestres">
            <p class="text-center animate-pulse">Conectando ao Banco de Dados...</p>
        </div>

        <div class="mt-10 space-y-6">
            <div class="border-t border-slate-800 pt-6">
                <p class="text-center text-xs gold-text uppercase mb-4">Anexar Comprovantes</p>
                <input type="file" class="w-full bg-slate-900 p-4 rounded-xl text-xs mb-2">
                <input type="file" class="w-full bg-slate-900 p-4 rounded-xl text-xs mb-2">
                <input type="file" class="w-full bg-slate-900 p-4 rounded-xl text-xs">
            </div>

            <div class="border-t border-slate-800 pt-6">
                <input type="text" placeholder="Seu Nome Completo" class="w-full p-4 bg-slate-900 border border-slate-800 rounded-xl text-sm mb-3">
                <input type="text" placeholder="Seu Pix para Receber" class="w-full p-4 bg-slate-900 border border-slate-800 rounded-xl text-sm mb-4">
                <button class="w-full gold-bg py-5 rounded-2xl font-black uppercase">Ativar Meu Protocolo</button>
            </div>
        </div>

        <footer class="mt-10 pb-10 text-center border-t border-slate-800 pt-6">
            <p class="text-[10px] text-slate-500 uppercase">© 2026 PROTOCOLO GALDINO FIDALGO</p>
        </footer client>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

        // Suas credenciais reais extraídas do seu print
        const firebaseConfig = {
            apiKey: "AIzaSyCZipVpWjOMtULxM5ZjJG_Ky",
            authDomain: "ajuda-mutua-7d99a.firebaseapp.com",
            projectId: "ajuda-mutua-7d99a",
            storageBucket: "ajuda-mutua-7d99a.appspot.com",
            messagingSenderId: "1070775313117",
            appId: "1:1070775313117:web:fa8095ff0e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function carregarDados() {
            try {
                // Buscando o documento "mestre" na sua coleção "usuarios"
                const docRef = doc(db, "usuarios", "mestre");
                const snap = await getDoc(docRef);

                if (snap.exists()) {
                    const d = snap.data();
                    const lista = document.getElementById('lista-mestres');
                    
                    // Monta a lista de mestres na tela
                    lista.innerHTML = `
                        <div onclick="navigator.clipboard.writeText('${d.pix}'); alert('Pix Copiado!')" class="card flex justify-between items-center cursor-pointer">
                            <div><p class="text-[10px] gold-text">NÍVEL 1</p><p class="font-bold">${d.nome}</p></div>
                            <p class="text-xs font-mono text-slate-400">${d.pix}</p>
                        </div>
                        <div onclick="navigator.clipboard.writeText('${d.pix}'); alert('Pix Copiado!')" class="card flex justify-between items-center cursor-pointer">
                            <div><p class="text-[10px] gold-text">NÍVEL 2</p><p class="font-bold">Sistema de Apoio</p></div>
                            <p class="text-xs font-mono text-slate-400">${d.pix}</p>
                        </div>
                        <div onclick="navigator.clipboard.writeText('${d.pix}'); alert('Pix Copiado!')" class="card flex justify-between items-center cursor-pointer">
                            <div><p class="text-[10px] gold-text">NÍVEL 3</p><p class="font-bold">${d.nome} (Raiz)</p></div>
                            <p class="text-xs font-mono text-slate-400">${d.pix}</p>
                        </div>
                    `;
                } else {
                    document.getElementById('lista-mestres').innerText = "Erro: Documento 'mestre' não encontrado no banco.";
                }
            } catch (error) {
                document.getElementById('lista-mestres').innerText = "Erro de Conexão. Verifique a internet.";
                console.error(error);
            }
        }

        window.onload = carregarDados;
    </script>
</body>
</html>
