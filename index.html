<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajuda Mútua</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #05070a; color: #e2e8f0; font-family: sans-serif; }
        .gold-text { color: #d4af37; font-style: italic; }
        .gold-bg { background: linear-gradient(135deg, #d4af37 0%, #f2d06b 100%); color: #000; }
        .card { background-color: #0f172a; border: 1px solid #1e293b; transition: all 0.2s; }
        
        /* Botão Flutuante */
        .btn-regras {
            position: fixed; bottom: 30px; right: 20px; width: 60px; height: 60px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 10px; font-weight: 900; text-transform: uppercase; z-index: 1000;
        }
    </style>
</head>
<body class="p-5">

    <div class="max-w-md mx-auto">
        <header class="text-center mb-10">
            <h1 class="text-2xl font-black gold-text uppercase italic">Fila de Ativação</h1>
            <p class="text-[10px] text-slate-500 uppercase font-bold">Toque nos cards para copiar as chaves</p>
        </header>

        <div id="lista-mestres" class="space-y-3">
            <p class="text-center animate-pulse text-slate-600">Carregando...</p>
        </div>

        <div class="mt-10 space-y-6">
            <div>
                <p class="text-center text-[10px] gold-text uppercase font-black mb-4">1. Anexe os Comprovantes</p>
                <input type="file" class="w-full bg-slate-900 p-4 rounded-xl text-xs mb-2">
                <input type="file" class="w-full bg-slate-900 p-4 rounded-xl text-xs mb-2">
                <input type="file" class="w-full bg-slate-900 p-4 rounded-xl text-xs">
            </div>

            <div class="border-t border-slate-800 pt-6">
                <p class="text-center text-[10px] gold-text uppercase font-black mb-4">2. Dados de Recebimento</p>
                <input type="text" placeholder="Nome Completo" class="w-full p-4 bg-slate-900 rounded-xl text-sm mb-3">
                <input type="text" placeholder="Sua Chave Pix" class="w-full p-4 bg-slate-900 rounded-xl text-sm mb-4">
                <button class="w-full gold-bg py-5 rounded-2xl font-black uppercase italic">Ativar Meu Protocolo</button>
            </div>
        </div>

        <footer class="mt-20 mb-10 text-center border-t border-slate-900 pt-8">
            <p class="text-[9px] text-slate-600 uppercase font-black tracking-widest">
                © 2026 PROTOCOLO DE ALAVANCAGEM <span class="gold-text">GALDINO FIDALGO</span>
            </p>
        </footer>
    </div>

    <div onclick="alert('REGRAS:\n1. Doe R$ 5,00 para cada mestre.\n2. Anexe os prints.\n3. Ative seu cadastro.')" class="btn-regras gold-bg italic">Regras</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCZipVpWjOMtULxM5ZjJG_Ky",
            authDomain: "ajuda-mutua-7d99a.firebaseapp.com",
            projectId: "ajuda-mutua-7d99a",
            storageBucket: "ajuda-mutua-7d99a.appspot.com",
            messagingSenderId: "1070775313117",
            appId: "1:1070775313117:web:fa8095ff0e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function carregar() {
            try {
                const snap = await getDoc(doc(db, "usuarios", "mestre"));
                if (snap.exists()) {
                    const d = snap.data();
                    document.getElementById('lista-mestres').innerHTML = `
                        <div onclick="navigator.clipboard.writeText('${d.pix}'); alert('Copiado!')" class="card p-4 rounded-xl flex justify-between items-center cursor-pointer border-l-4 border-yellow-600">
                            <div><p class="text-[8px] gold-text uppercase">Nível 1</p><p class="text-sm font-bold italic">${d.nome}</p></div>
                            <p class="text-[10px] font-mono text-slate-400">${d.pix}</p>
                        </div>
                        <div onclick="navigator.clipboard.writeText('${d.pix}'); alert('Copiado!')" class="card p-4 rounded-xl flex justify-between items-center cursor-pointer border-l-4 border-yellow-600">
                            <div><p class="text-[8px] gold-text uppercase">Nível 2</p><p class="text-sm font-bold italic">Suporte Sistema</p></div>
                            <p class="text-[10px] font-mono text-slate-400">${d.pix}</p>
                        </div>
                        <div onclick="navigator.clipboard.writeText('${d.pix}'); alert('Copiado!')" class="card p-4 rounded-xl flex justify-between items-center cursor-pointer border-l-4 border-yellow-600">
                            <div><p class="text-[8px] gold-text uppercase">Nível 3</p><p class="text-sm font-bold italic">${d.nome}</p></div>
                            <p class="text-[10px] font-mono text-slate-400">${d.pix}</p>
                        </div>
                    `;
                }
            } catch (e) { console.error(e); }
        }
        window.onload = carregar;
    </script>
</body>
</html>
