<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escritório Virtual | Protocolo Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #020617; color: #f8fafc; font-family: 'Montserrat', sans-serif; }
        .glass-card { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 20px; }
        .btn-gold { background: linear-gradient(135deg, #b8860b 0%, #fde047 100%); color: #000; font-weight: 900; }
        #toast { visibility: hidden; min-width: 200px; background: #fde047; color: #000; text-align: center; border-radius: 50px; padding: 10px; position: fixed; z-index: 100; left: 50%; bottom: 30px; transform: translateX(-50%); font-weight: 900; font-size: 10px; }
        #toast.show { visibility: visible; }
    </style>
</head>
<body class="p-4">
    <div id="toast">COPIADO!</div>
    <div id="loading" class="text-center py-20 text-yellow-500 font-bold animate-pulse">Sincronizando com a rede...</div>

    <div id="painel" class="max-w-md mx-auto hidden">
        <header class="mb-6 pt-4 flex justify-between items-start">
            <div>
                <h1 class="text-xl font-black text-yellow-500 uppercase italic leading-tight">Protocolo Elite</h1>
                <p class="text-[8px] text-slate-500 font-bold uppercase tracking-widest">Escritório Virtual</p>
            </div>
            <span id="statusBadge" class="text-[9px] font-black uppercase p-1 px-2 glass-card italic">Verificando...</span>
        </header>

        <div class="space-y-6">
            <div class="glass-card p-6 text-center border-t-2 border-yellow-500/30">
                <h2 class="text-[10px] font-black mb-4 uppercase tracking-widest italic opacity-70">Sua Rede Mutua</h2>
                <div id="statsRede" class="text-[10px] font-bold uppercase text-slate-400">Aguardando liberação da gestão...</div>
            </div>

            <div id="areaLink" class="glass-card p-5 hidden bg-yellow-500/5 border-yellow-500/40">
                <p class="text-[9px] text-yellow-500 font-black mb-3 text-center uppercase tracking-widest">Seu Link de Convite Profissional</p>
                <input type="text" id="linkConvite" readonly class="w-full bg-black/40 border border-white/5 p-3 rounded text-[10px] text-white outline-none mb-3 text-center">
                <button onclick="copiar()" class="btn-gold w-full py-4 rounded-xl text-[10px] shadow-lg shadow-yellow-500/10">COPIAR MEU LINK</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script>
        // Configuração Corrigida
        const firebaseConfig = {
            apiKey: "AIzaSyCZIP0M0M8FqC_LAtI9I36e_IIn_V-C4m4",
            authDomain: "ajuda-mutua-7d99a.firebaseapp.com",
            databaseURL: "https://ajuda-mutua-7d99a-default-rtdb.firebaseio.com",
            projectId: "ajuda-mutua-7d99a",
            storageBucket: "ajuda-mutua-7d99a.appspot.com",
            appId: "1:1070775313117:web:fa90f5f0cb519ab38b1d34"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const urlParams = new URLSearchParams(window.location.search);
        const meuNome = urlParams.get('user');

        if(!meuNome) {
            document.getElementById('loading').innerHTML = "<span class='text-red-500'>ERRO: USUÁRIO NÃO IDENTIFICADO.</span>";
        } else {
            database.ref('solicitacoes/').on('value', (snap) => {
                let user = null;
                snap.forEach(c => { if(c.val().nome === meuNome) user = c.val(); });

                if(user) {
                    document.getElementById('loading').style.display = "none";
                    document.getElementById('painel').classList.remove('hidden');

                    if(user.status === 'liberado') {
                        document.getElementById('statusBadge').innerText = "CONTA ATIVA";
                        document.getElementById('statusBadge').classList.add('text-green-500');
                        document.getElementById('areaLink').classList.remove('hidden');
                        document.getElementById('statsRede').innerText = "Nível 01: Ativo | Nível 02: Ativo | Nível 03: Ativo";
                        document.getElementById('linkConvite').value = "https://galdinofidalgo10.github.io/ajuda-mutua/index.html?ref=" + encodeURIComponent(meuNome);
                    } else {
                        document.getElementById('statusBadge').innerText = "AGUARDANDO ATIVAÇÃO";
                        document.getElementById('statusBadge').classList.add('text-yellow-500', 'animate-pulse');
                        document.getElementById('statsRede').innerHTML = "Sua conta está em análise.<br>Fale com o suporte se necessário.";
                    }
                } else {
                    document.getElementById('loading').innerHTML = "<span class='text-yellow-500'>ERRO: CADASTRO NÃO ENCONTRADO.</span>";
                }
            });
        }

        function copiar() {
            const link = document.getElementById('linkConvite');
            link.select();
            document.execCommand('copy');
            const t = document.getElementById("toast");
            t.className = "show";
            setTimeout(() => { t.className = ""; }, 2000);
        }
    </script>
</body>
</html>
